<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>login page</title>
	<link rel="stylesheet" href="swapskill2.css">
</head>
<body>
	<div class="wrapper">
		<!--login-->
		<div class="auth-card">
			<h2>Login</h2>
			<form> 
				<input type="text" id="loginEmail" placeholder="Email">
				<input type="password"id="loginPassword" placeholder="Password">
				<button type="submit" id="loginBtn" >Login</button>
			</form>
		</div> 
		<!--Sign up-->
		<div class="auth-card">
			<h2>Sign up</h2>
			<form>
				<input type="text" id="fullName" placeholder="Fullname">
				<input type="text" id="signupEmail" placeholder="Email">
				<input type="password" id="signupPassword" placeholder="Password">
				<button type="submit" id="signupBtn">Create account</button>
			</form>
		</div>
	</div>
	<script src="swapskill2.js"></script>
</body>
</html>
